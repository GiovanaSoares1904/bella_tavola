name: CI — Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-api:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
         

      - name: Testar API
        run: |
          # Inicia a API em background e salva o PID
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          
          # Aguarda até 10 segundos para a API subir (mais seguro que sleep fixo)
          timeout 10s sh -c 'until curl --silent --fail http://localhost:8000/health; do sleep 1; done'
          
          echo "API respondeu com sucesso"
