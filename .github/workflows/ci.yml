name: CI Pipeline

on: [push, pull_request] # Define quando o workflow será executado

jobs:
  test:
    runs-on: ubuntu-latest # O sistema operacional da máquina virtual

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4 # Baixa o código do seu repositório

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Versão do Python que você deseja usar

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar testes
        run: pytest tests/ -v --tb=short